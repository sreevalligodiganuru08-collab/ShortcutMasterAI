{% extends 'base.html' %}

{% block title %}Page Not Found - ShortcutMaster AI{% endblock %}

{% block content %}
<div style="text-align: center; padding: 6rem 1rem;">
    <div style="font-size: 6rem; color: var(--accent-pink); animation: float 3s ease-in-out infinite; display: inline-block;">
        <ion-icon name="warning-outline"></ion-icon>
    </div>
    
    <h1 style="font-size: 3.5rem; margin-top: 1rem; margin-bottom: 1rem;">404 - <span class="text-gradient-pink-orange">Shortcut Broken</span></h1>
    <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto 2.5rem; font-size: 1.1rem;">
        The shortcut combination you used led to a dead end. Let's redirect you back to base.
    </p>
    
    <a href="{% url 'landing' %}" class="btn-primary">
        <ion-icon name="home-outline"></ion-icon> Back to Safety
    </a>
</div>

<style>
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }
</style>
{% endblock %}
